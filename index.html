<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>why can’t we be together again baby?</title>

<style>
  body {
    text-align: center;
    font-family: Arial, sans-serif;
    background-color: #ffe6e6;
    margin-top: 100px;
    overflow: hidden;
  }

  h1 { font-size: 28px; }
  p { font-size: 20px; }

  button {
    padding: 15px 30px;
    font-size: 20px;
    margin: 10px;
    cursor: pointer;
    border: none;
    border-radius: 10px;
    position: relative;
  }

  #yesBtn {
    background-color: #ff4d6d;
    color: white;
    transition: 0.3s;
  }

  #noBtn {
    background-color: #ccc;
    position: absolute;
  }

  #lyrics {
    margin-top: 20px;
    font-style: italic;
    color: #444;
  }

  .heart {
    position: fixed;
    color: red;
    font-size: 20px;
    animation: floatUp 3s linear infinite;
  }

  @keyframes floatUp {
    from { transform: translateY(0); opacity: 1; }
    to { transform: translateY(-300px); opacity: 0; }
  }
</style>
</head>

<body>

<h1>why can’t we be together again baby?</h1>
<p>may chance pa ba o wala na?</p>

<button id="yesBtn" onclick="yesClick()">Yes</button>
<button id="noBtn" onclick="noClick()">No</button>

<p id="lyrics"></p>

<audio id="bgMusic">
  <source src="music.mp3" type="audio/mpeg">
</audio>

<script>
let yesSize = 20;
let firstNoClick = true;

// YES CLICK
function yesClick() {
  document.body.innerHTML = `
    <h1>💖💖💖</h1>
    <p>
    hzhshx xabe k n nga bah eih.... miss m tlg aq no... tutuu b ung ka-call m... 
    kung ayaw m n tlga.... ☹️☹️☹️ sad aq xd char.. hello sau... 
    pa-long press k n lg jan ah,,, hays xad ak toloi... sowwy 💔💖
    </p>
  `;
  startHearts();
}

// NO CLICK
function noClick() {
  let music = document.getElementById("bgMusic");

  if (firstNoClick) {
    music.currentTime = 60; // chorus start
    music.play().catch(() => {});
    showLyrics();
    firstNoClick = false;
  }

  // move NO button
  const noBtn = document.getElementById("noBtn");
  const maxX = window.innerWidth - 100;
  const maxY = window.innerHeight - 100;

  const randX = Math.floor(Math.random() * maxX);
  const randY = Math.floor(Math.random() * maxY);

  noBtn.style.left = randX + "px";
  noBtn.style.top = randY + "px";

  // grow YES
  yesSize += 8;
  const yesBtn = document.getElementById("yesBtn");
  yesBtn.style.fontSize = yesSize + "px";
  yesBtn.style.padding = yesSize + "px";
}

// LYRICS (simplified vibe lang)
function showLyrics() {
  const lyrics = document.getElementById("lyrics");
  lyrics.innerHTML = "🎶 baby... bumalik ka na sa akin... di ko kayang mawala ka... 🎶";
}

// HEARTS ANIMATION
function startHearts() {
  setInterval(() => {
    let heart = document.createElement("div");
    heart.className = "heart";
    heart.innerHTML = "💖";
    heart.style.left = Math.random() * window.innerWidth + "px";
    heart.style.bottom = "0px";
    document.body.appendChild(heart);

    setTimeout(() => {
      heart.remove();
    }, 3000);
  }, 300);
}
</script>

</body>
</html>
